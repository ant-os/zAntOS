
[build]
target = "x86_64-unknown-none"
rustflags = [
    "-C", "link-arg=-nostartfiles",
    "-C", "link-arg=-nodefaultlibs",
    "-C", "link-arg=-nostdlib",
    "-C", "link-arg=-entry AntkDriverEntry",
    "-C", "code-model=large",
    "-C", "relocation-model=static",
    "-C", "panic=abort",
]


